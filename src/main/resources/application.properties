spring.application.name=library-managment-system
server.port=8080

# Disable DataSource auto-configuration (we use our own DBHandler)
spring.autoconfigure.exclude=org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration

# JWT
jwt.secret=library-mgmt-secret-key-change-in-production-min-256-bits-long
jwt.expiration=86400000
